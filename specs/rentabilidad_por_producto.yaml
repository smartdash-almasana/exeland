slug: rentabilidad_por_producto
title: "Rentabilidad por Producto"
subtitle: "Identificá qué productos te dan más ganancia"
version: "1.0.0"
price_ars: 5500
category: "financial"
tags: ["rentabilidad", "producto", "ganancia", "margen", "abc"]

branding:
  primary_color: "#1A3C5E"
  secondary_color: "#388E3C"
  accent_color: "#FFB300"

sheets:
  - name: "BIENVENIDA"
    type: "welcome"
    protected: true

  - name: "PRODUCTOS"
    type: "input"
    protected: false
    fields:
      # Producto 1
      - {id: "p1_nombre", label: "Producto 1: Nombre", row: 5, col: 2, input_type: "text", example: "Producto A"}
      - {id: "p1_precio_venta", label: "P1: Precio Venta Unitario", row: 6, col: 2, input_type: "currency", default: 0, validation: "non_negative_number"}
      - {id: "p1_costo_unitario", label: "P1: Costo Total Unitario", row: 7, col: 2, input_type: "currency", default: 0, validation: "non_negative_number"}
      - {id: "p1_unidades_vendidas", label: "P1: Unidades Vendidas", row: 8, col: 2, input_type: "integer", default: 0, validation: "integer_non_negative"}

      # Producto 2
      - {id: "p2_nombre", label: "Producto 2: Nombre", row: 10, col: 2, input_type: "text", example: "Producto B"}
      - {id: "p2_precio_venta", label: "P2: Precio Venta Unitario", row: 11, col: 2, input_type: "currency", default: 0, validation: "non_negative_number"}
      - {id: "p2_costo_unitario", label: "P2: Costo Total Unitario", row: 12, col: 2, input_type: "currency", default: 0, validation: "non_negative_number"}
      - {id: "p2_unidades_vendidas", label: "P2: Unidades Vendidas", row: 13, col: 2, input_type: "integer", default: 0, validation: "integer_non_negative"}

      # Producto 3
      - {id: "p3_nombre", label: "Producto 3: Nombre", row: 15, col: 2, input_type: "text", example: "Producto C"}
      - {id: "p3_precio_venta", label: "P3: Precio Venta Unitario", row: 16, col: 2, input_type: "currency", default: 0, validation: "non_negative_number"}
      - {id: "p3_costo_unitario", label: "P3: Costo Total Unitario", row: 17, col: 2, input_type: "currency", default: 0, validation: "non_negative_number"}
      - {id: "p3_unidades_vendidas", label: "P3: Unidades Vendidas", row: 18, col: 2, input_type: "integer", default: 0, validation: "integer_non_negative"}

  - name: "MOTOR"
    type: "engine"
    protected: true
    hidden: true
    formulas:
      # P1 Calcs
      - {id: "p1_ganancia_unitaria", formula_ref: "margen_bruto_pesos", bindings: {precio_venta: "PRODUCTOS!C6", costo_unitario: "PRODUCTOS!C7"}}
      - {id: "p1_margen_unitario", formula_ref: "margen_bruto", bindings: {precio_venta: "PRODUCTOS!C6", costo_unitario: "PRODUCTOS!C7"}}
      - {id: "p1_ganancia_total", formula_ref: "ingresos_totales", bindings: {precio_venta: "MOTOR!C2", unidades_vendidas: "PRODUCTOS!C8"}}

      # P2 Calcs
      - {id: "p2_ganancia_unitaria", formula_ref: "margen_bruto_pesos", bindings: {precio_venta: "PRODUCTOS!C11", costo_unitario: "PRODUCTOS!C12"}}
      - {id: "p2_margen_unitario", formula_ref: "margen_bruto", bindings: {precio_venta: "PRODUCTOS!C11", costo_unitario: "PRODUCTOS!C12"}}
      - {id: "p2_ganancia_total", formula_ref: "ingresos_totales", bindings: {precio_venta: "MOTOR!C5", unidades_vendidas: "PRODUCTOS!C13"}}

      # P3 Calcs
      - {id: "p3_ganancia_unitaria", formula_ref: "margen_bruto_pesos", bindings: {precio_venta: "PRODUCTOS!C16", costo_unitario: "PRODUCTOS!C17"}}
      - {id: "p3_margen_unitario", formula_ref: "margen_bruto", bindings: {precio_venta: "PRODUCTOS!C16", costo_unitario: "PRODUCTOS!C17"}}
      - {id: "p3_ganancia_total", formula_ref: "ingresos_totales", bindings: {precio_venta: "MOTOR!C8", unidades_vendidas: "PRODUCTOS!C18"}}

  - name: "DASHBOARD"
    type: "dashboard"
    protected: true

  - name: "GUIA"
    type: "guide"
    protected: true

formulas:
  - "margen_bruto"
  - "margen_bruto_pesos"
  - "ingresos_totales"
