slug: control_de_gastos
title: "Control de Gastos"
subtitle: "Registrá y categorizá todos los gastos de tu negocio"
version: "1.0.0"
price_ars: 4800
category: "financial"
tags: [gastos, control, egresos, categorias, presupuesto]

branding:
  primary_color: "#1A3C5E"
  secondary_color: "#C62828"
  accent_color: "#FFC107"

sheets:
  - name: "BIENVENIDA"
    type: "welcome"
    protected: true

  - name: "GASTOS"
    type: "input"
    protected: false
    fields:
      - id: "gasto_fijo_alquiler"
        label: "Gasto Fijo: Alquiler"
        row: 5
        col: 2
        input_type: "currency"
        default: 0
        validation: "non_negative_number"

      - id: "gasto_fijo_servicios"
        label: "Gasto Fijo: Servicios (luz, gas, internet)"
        row: 6
        col: 2
        input_type: "currency"
        default: 0
        validation: "non_negative_number"

      - id: "gasto_fijo_sueldos"
        label: "Gasto Fijo: Sueldos"
        row: 7
        col: 2
        input_type: "currency"
        default: 0
        validation: "non_negative_number"

      - id: "gasto_variable_proveedores"
        label: "Gasto Variable: Proveedores / Mercadería"
        row: 9
        col: 2
        input_type: "currency"
        default: 0
        validation: "non_negative_number"

      - id: "gasto_variable_marketing"
        label: "Gasto Variable: Marketing y Publicidad"
        row: 10
        col: 2
        input_type: "currency"
        default: 0
        validation: "non_negative_number"

      - id: "gasto_variable_envios"
        label: "Gasto Variable: Envíos y Logística"
        row: 11
        col: 2
        input_type: "currency"
        default: 0
        validation: "non_negative_number"

      - id: "presupuesto_total_mensual"
        label: "Presupuesto Total Mensual (Opcional)"
        row: 13
        col: 2
        input_type: "currency"
        default: 0
        validation: "non_negative_number"
        hint: "Para comparar lo gastado vs. lo presupuestado."

  - name: "MOTOR"
    type: "engine"
    protected: true
    hidden: true
    formulas:
      - id: "total_gastos_fijos"
        formula_ref: "egresos_totales"
        bindings:
          costos_fijos: "SUM(GASTOS!C5:C7)"
          costo_variable_unitario: "0"
          unidades_vendidas: "1"

      - id: "total_gastos_variables"
        formula_ref: "egresos_totales"
        bindings:
          costos_fijos: "SUM(GASTOS!C9:C11)"
          costo_variable_unitario: "0"
          unidades_vendidas: "1"

      - id: "total_gastos"
        formula_ref: "egresos_totales"
        bindings:
          costos_fijos: "MOTOR!C2 + MOTOR!C3"
          costo_variable_unitario: "0"
          unidades_vendidas: "1"

      - id: "desvio_presupuesto"
        formula_ref: "resultado_neto"
        bindings:
          ingresos_totales: "GASTOS!C13"
          egresos_totales: "MOTOR!C4"

  - name: "DASHBOARD"
    type: "dashboard"
    protected: true

  - name: "GUIA"
    type: "guide"
    protected: true

formulas:
  - egresos_totales
  - resultado_neto
