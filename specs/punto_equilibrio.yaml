slug: punto_equilibrio
title: "Punto de Equilibrio"
subtitle: "Cuánto tenés que vender para no perder"
version: "1.0.0"
price_ars: 0
category: financial

branding:
  primary_color: "#1A3C5E"
  secondary_color: "#00A36C"
  accent_color: "#F4A01C"

sheets:
  - name: BIENVENIDA
    type: welcome
    protected: true

  - name: DATOS
    type: input
    protected: false
    fields:
      - id: nombre_negocio
        label: "Nombre del negocio / producto"
        row: 5
        col: 2
        input_type: text
        example: "Mi Negocio"
        required: true

      - id: precio_venta
        label: "Precio de venta unitario (ARS)"
        row: 7
        col: 2
        input_type: currency
        default: 0
        validation: positive_number
        required: true

      - id: costo_variable_unitario
        label: "Costo variable por unidad (ARS)"
        row: 8
        col: 2
        input_type: currency
        default: 0
        validation: non_negative_number
        required: true

      - id: costos_fijos
        label: "Costos fijos del mes (ARS)"
        row: 9
        col: 2
        input_type: currency
        default: 0
        validation: non_negative_number
        required: true

      - id: unidades_estimadas
        label: "Unidades que estimás vender"
        row: 11
        col: 2
        input_type: integer
        default: 0
        validation: integer_non_negative

  - name: MOTOR
    type: engine
    protected: true
    hidden: true
    formulas:
      - id: punto_equilibrio_unidades
        formula_ref: punto_equilibrio_unidades
        bindings:
          costos_fijos: DATOS!C9
          precio_venta: DATOS!C7
          costo_variable_unitario: DATOS!C8

      - id: margen_bruto
        formula_ref: margen_bruto
        bindings:
          precio_venta: DATOS!C7
          costo_unitario: DATOS!C8

      - id: punto_equilibrio_pesos
        formula_ref: punto_equilibrio_pesos
        bindings:
          costos_fijos: DATOS!C9
          margen_contribucion: MOTOR!C3

      - id: ingresos_totales
        formula_ref: ingresos_totales
        bindings:
          precio_venta: DATOS!C7
          unidades_vendidas: DATOS!C11

      - id: egresos_totales
        formula_ref: egresos_totales
        bindings:
          costos_fijos: DATOS!C9
          costo_variable_unitario: DATOS!C8
          unidades_vendidas: DATOS!C11

      - id: resultado_neto
        formula_ref: resultado_neto
        bindings:
          ingresos_totales: MOTOR!C5
          egresos_totales: MOTOR!C6

  - name: DASHBOARD
    type: dashboard
    protected: true

  - name: GUIA
    type: guide
    protected: true

formulas:
  - punto_equilibrio_unidades
  - punto_equilibrio_pesos
  - margen_bruto
  - ingresos_totales
  - egresos_totales
  - resultado_neto
